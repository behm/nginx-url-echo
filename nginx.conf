events {}

http {
    server {
        listen 80;
        server_name _;

        location / {
            default_type text/html;

            return 200 '<!DOCTYPE html>
<html>
<head>
<title>Echo URL</title>
<style>
  body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; background: #f4f6f9; color: #333; display: flex; justify-content: center; padding: 60px 20px; margin: 0; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 40px 48px; max-width: 640px; width: 100%; }
  h1 { margin: 0 0 24px; font-weight: 600; font-size: 1.6rem; color: #1a1a2e; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e8e8e8; font-size: .95rem; }
  th { width: 120px; color: #777; font-weight: 500; }
  td { word-break: break-all; }
  tr:last-child th, tr:last-child td { border-bottom: none; }
</style>
</head>
<body>
<div class="card">
  <h1>NGINX URL Echo</h1>
  <table>
    <tr><th>Scheme</th><td>$scheme</td></tr>
    <tr><th>Host</th><td>$host</td></tr>
    <tr><th>Full URL</th><td>$scheme://$host$request_uri</td></tr>
    <tr><th>Path</th><td>$uri</td></tr>
    <tr><th>Query</th><td>$args</td></tr>
  </table>
</div>
</body>
</html>';
        }
    }
}